<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12131a" />
      <stop offset="100%" stop-color="#07080b" />
    </linearGradient>
    
    <!-- Neon Violet / Pink Gradient -->
    <linearGradient id="neonGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    
    <!-- Neon Green/Cyan Gradient for Battery -->
    <linearGradient id="neonGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#1f2937" stroke-width="4"/>
  
  <!-- Cyber grid lines in background -->
  <path d="M 0 128 L 512 128 M 0 256 L 512 256 M 0 384 L 512 384 M 128 0 L 128 512 M 256 0 L 256 512 M 384 0 L 384 512" 
        stroke="#1f2937" stroke-width="1.5" stroke-opacity="0.4" fill="none" />

  <!-- Outer Glow Hexagon -->
  <polygon points="256,40 440,146 440,366 256,472 72,366 72,146" 
           fill="none" stroke="url(#neonGlow)" stroke-width="6" opacity="0.3" filter="url(#glow)" />
  
  <g filter="url(#glow)">
    <!-- Drone Arms (Diagonal Cross) -->
    <line x1="120" y1="120" x2="392" y2="392" stroke="url(#neonGlow)" stroke-width="20" stroke-linecap="round" />
    <line x1="392" y1="120" x2="120" y2="392" stroke="url(#neonGlow)" stroke-width="20" stroke-linecap="round" />
    
    <!-- Propellers (4 circles with dashed patterns) -->
    <!-- Top-Left Prop -->
    <circle cx="120" cy="120" r="48" fill="none" stroke="#ec4899" stroke-width="4" stroke-dasharray="10 6" opacity="0.8"/>
    <circle cx="120" cy="120" r="14" fill="#0d0e12" stroke="url(#neonGlow)" stroke-width="5" />
    
    <!-- Top-Right Prop -->
    <circle cx="392" cy="120" r="48" fill="none" stroke="#ec4899" stroke-width="4" stroke-dasharray="10 6" opacity="0.8"/>
    <circle cx="392" cy="120" r="14" fill="#0d0e12" stroke="url(#neonGlow)" stroke-width="5" />
    
    <!-- Bottom-Left Prop -->
    <circle cx="120" cy="392" r="48" fill="none" stroke="#ec4899" stroke-width="4" stroke-dasharray="10 6" opacity="0.8"/>
    <circle cx="120" cy="392" r="14" fill="#0d0e12" stroke="url(#neonGlow)" stroke-width="5" />
    
    <!-- Bottom-Right Prop -->
    <circle cx="392" cy="392" r="48" fill="none" stroke="#ec4899" stroke-width="4" stroke-dasharray="10 6" opacity="0.8"/>
    <circle cx="392" cy="392" r="14" fill="#0d0e12" stroke="url(#neonGlow)" stroke-width="5" />
    
    <!-- Center Drone Body -->
    <rect x="206" y="176" width="100" height="160" rx="20" fill="#12131a" stroke="url(#neonGlow)" stroke-width="8" />
    
    <!-- Camera Lens (FPV Camera) at the top -->
    <rect x="236" y="146" width="40" height="40" rx="8" fill="#1e1b4b" stroke="#a855f7" stroke-width="4" />
    <circle cx="256" cy="166" r="10" fill="#06b6d4" />
    
    <!-- Neon Battery Level Indicator in center of drone -->
    <rect x="226" y="210" width="60" height="100" rx="10" fill="#07080b" stroke="#374151" stroke-width="4" />
    
    <!-- Battery Cells (3 levels representing LiPo cell blocks) -->
    <rect x="234" y="278" width="44" height="22" rx="4" fill="url(#neonGreen)" />
    <rect x="234" y="249" width="44" height="22" rx="4" fill="url(#neonGreen)" />
    <rect x="234" y="220" width="44" height="22" rx="4" fill="url(#neonGreen)" />
    
    <!-- Battery Cap -->
    <rect x="246" y="202" width="20" height="8" rx="2" fill="#374151" />
  </g>
  
  <!-- Sleek metallic reflections or highlights -->
  <path d="M 216 186 L 296 186" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.3" />
</svg>
